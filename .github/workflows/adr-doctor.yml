name: ADR Doctor

on:
  push:
    branches: [main]
    paths:
      - "docs/decisions/**"
      - "adrs.toml"
      - ".github/workflows/adr-doctor.yml"
  pull_request:
    paths:
      - "docs/decisions/**"
      - "adrs.toml"
      - ".github/workflows/adr-doctor.yml"

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: "adr-doctor-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_ENV_HINTS: 1

permissions: {}

jobs:
  adr_doctor:
    name: ADR health check
    if: github.repository_owner == 'toobuntu'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          install: joshrotenberg/brew/adrs

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: adrs doctor
        run: adrs doctor
