name: Autogenerated files check

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/autogenerated-files.yml
      - cmd/**
      - dev-cmd/**
      - completions/**
      - manpages/**
  pull_request:
    paths:
      - .github/workflows/autogenerated-files.yml
      - cmd/**
      - dev-cmd/**
      - completions/**
      - manpages/**

permissions:
  contents: read

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  autogenerated:
    if: github.repository_owner == 'toobuntu'
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - name: Link generate-tap-man-completions into Homebrew
        run: |
          brew_lib="$(brew --repo)/Library/Homebrew"
          mkdir -p "${brew_lib}/cmd"
          ln -f dev-cmd/generate-tap-man-completions.rb "${brew_lib}/cmd/generate-tap-man-completions.rb"

      - name: Check for changes to autogenerated files
        run: |
          brew generate-tap-man-completions --no-exit-code
          # -I '\.TH ' ignores date-only changes in compiled roff headers
          # (.TH "CMD" "1" "Month Year" "Homebrew") that occur when the
          # month rolls over. These are cosmetic and not a source change.
          if ! git diff --quiet -I '\.TH ' completions/ manpages/; then
            echo "::error::Autogenerated files are out of date." \
              "Please update the source files (e.g. cmd_args) and run:" \
              "scripts/run-generate-tap-man-completions.sh"
            exit 1
          fi

      - name: Validate completion file syntax
        run: |
          # Bash: check syntax with bash -n
          for f in completions/bash/brew-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.license ]] && continue
            bash -n "$f"
          done
          # Fish: check syntax with fish --no-execute (if fish is available)
          if command -v fish >/dev/null 2>&1; then
            for f in completions/fish/*.fish; do
              [ -f "$f" ] && fish --no-execute "$f"
            done
          fi

      - name: Unlink generate-tap-man-completions from Homebrew
        if: always()
        run: rm -f "$(brew --repo)/Library/Homebrew/cmd/generate-tap-man-completions.rb"
