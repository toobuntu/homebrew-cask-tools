name: CI

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  style:
    if: github.repository_owner == 'toobuntu'
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - name: Cache style cache
        if: runner.os == 'macOS'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/Library/Caches/Homebrew/style
          key: macos-style-cache-${{ github.sha }}
          restore-keys: macos-style-cache-

      - name: brew style
        run: brew style ./cmd/purge-quarantine.rb

  brew_tests:
    if: github.repository_owner == 'toobuntu'
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - name: Link tap files into Homebrew for brew tests
        run: |
          brew_lib="$(brew --repo)/Library/Homebrew"
          mkdir -p "${brew_lib}/cmd" "${brew_lib}/test/cmd"
          ln -f cmd/purge-quarantine.rb "${brew_lib}/cmd/purge-quarantine.rb"
          ln -f test/cmd/purge-quarantine_spec.rb "${brew_lib}/test/cmd/purge-quarantine_spec.rb"

      - name: brew tests
        run: brew tests --only=cmd/purge-quarantine

      - name: Unlink tap files from Homebrew
        if: always()
        run: |
          brew_lib="$(brew --repo)/Library/Homebrew"
          rm -f "${brew_lib}/cmd/purge-quarantine.rb"
          rm -f "${brew_lib}/test/cmd/purge-quarantine_spec.rb"
